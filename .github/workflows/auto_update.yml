name: Auto Convertidor de Inventario Excel

on:
  push:
    paths:
      - '*.xlsx'
      - '*.xls'
      - '*.csv'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar repositorio
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        pip install pandas openpyxl xlrd

    - name: Ejecutar convertidor
      run: python scripts/convert_excel.py

    - name: Guardar cambios en GitHub
      run: |
        git config --global user.name 'Data Auto-Updater'
        git config --global user.email 'bot@github.com'
        git add data_precios_v2.js
        git diff --quiet && git diff --staged --quiet || (git commit -m "Bot: Base de datos de precios actualizada automáticamente" && git push)
